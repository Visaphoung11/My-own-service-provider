spring.application.name=service
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# Database Connection (Added timeout settings for Docker reliability)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.validation-timeout=5000

# JPA Settings
# Change to 'validate' or 'none' when moving to production
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
# Fix N+1 Query Problem
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# App Settings
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Security & OAuth2
jwt.secretKey=${SECRET_KEY}
jwt.expiration=${EXPIRATION:3600000}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=profile,email

# Proxy/Cloud Deployment Settings
# Native is usually preferred for Tomcat in modern Spring Boot
server.forward-headers-strategy=native

# Cloudinary (Ensure you have a Java @Configuration class to read these!)
CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

# Docker/General
spring.docker.compose.enabled=false